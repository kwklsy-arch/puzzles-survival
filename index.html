<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 進度助你 - 遊戲追蹤器</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; }
        input:focus { outline: none; box-shadow: 0 0 0 2px rgba(244, 114, 182, 0.4); }
        /* 滾動條優化 */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-rose-50 to-pink-100 min-h-screen">

    <div id="root">
        <div class="flex items-center justify-center h-screen text-pink-500 font-bold animate-pulse">
            正在啟動追蹤器...
        </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const STORAGE_KEYS = {
            DATA: 'game_tracker_accounts_stable_v1',
            TITLE: 'game_tracker_title_stable_v1',
            COLS: 'game_tracker_cols_stable_v1'
        };

        // 內聯 SVG 圖標組件
        const Icons = {
            Check: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            ),
            RotateCcw: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            ),
            Trash2: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            ),
            PlusCircle: () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            )
        };

        const defaultData = [
            { id: '1', name: '雪隨風飄', daily: true, weekly: false, mall: true, base: false, ops: true, event: false, water: true, pack: '23', mine1: '25' },
            { id: '2', name: '°ǒ雨醉伴花眠ǒ°', daily: true, weekly: false, mall: true, base: false, ops: true, event: false, water: true, pack: '10', mine1: '25' },
            { id: '3', name: '煙火消逝的瞬間͜⁎✿', daily: true, weekly: false, mall: true, base: false, ops: true, event: false, water: true, pack: '28', mine1: '25' },
            { id: '4', name: '福壽山蜜蘋果･ω･', daily: true, daily: true, weekly: false, mall: true, base: false, ops: true, event: false, water: true, pack: '', mine1: '' },
            { id: '5', name: '拉拉山水蜜桃･ὢ･', daily: true, weekly: false, mall: true, base: false, ops: true, event: false, water: true, pack: '', mine1: '' },
            { id: '6', name: '好好吃的芭樂', daily: true, weekly: true, mall: true, base: true, ops: true, event: true, water: true, pack: '19', mine1: '19' },
            { id: '10', name: '小小1號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '20', mine1: '20' },
            { id: '11', name: '小小2號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '6', mine1: '20' },
            { id: '12', name: '小小3號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '20', mine1: '22' },
            { id: '13', name: '小小4號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '26', mine1: '20' },
            { id: '14', name: '小小5號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '24', mine1: '11' },
            { id: '15', name: '小小6號', daily: true, weekly: false, mall: true, base: false, ops: true, event: true, water: true, pack: '22', mine1: '22' },
        ];

        const defaultColumns = [
            { key: 'daily', label: '每日', type: 'bool' },
            { key: 'weekly', label: '周任', type: 'bool' },
            { key: 'mall', label: '商城', type: 'bool' },
            { key: 'base', label: '基地', type: 'bool' },
            { key: 'ops', label: '特作', type: 'bool' },
            { key: 'event', label: '節日', type: 'bool' },
            { key: 'water', label: '淨水', type: 'bool' },
            { key: 'pack', label: '救援包', type: 'number' },
            { key: 'mine1', label: '黃金礦', type: 'number' },
        ];

        function App() {
            const [accounts, setAccounts] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEYS.DATA);
                return saved ? JSON.parse(saved) : defaultData;
            });
            const [appTitle, setAppTitle] = useState(() => localStorage.getItem(STORAGE_KEYS.TITLE) || '🌸 進度助你');
            const [cols, setCols] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEYS.COLS);
                return saved ? JSON.parse(saved) : defaultColumns;
            });
            const [notif, setNotif] = useState('');

            // 同步儲存到 LocalStorage
            const saveAndState = (newAccs, newTitle, newCols) => {
                if (newAccs) {
                    setAccounts(newAccs);
                    localStorage.setItem(STORAGE_KEYS.DATA, JSON.stringify(newAccs));
                }
                if (newTitle !== undefined) {
                    setAppTitle(newTitle);
                    localStorage.setItem(STORAGE_KEYS.TITLE, newTitle);
                }
                if (newCols) {
                    setCols(newCols);
                    localStorage.setItem(STORAGE_KEYS.COLS, JSON.stringify(newCols));
                }
            };

            const notify = (msg) => {
                setNotif(msg);
                setTimeout(() => setNotif(''), 2000);
            };

            const resetAll = () => {
                if(!confirm('確定要執行換日重置嗎？')) return;
                const newAccounts = accounts.map(acc => {
                    const processNum = (val) => {
                        if (!val) return "";
                        let num = parseInt(val);
                        if (isNaN(num)) return "";
                        return (num <= 1 ? "30" : (num - 1).toString());
                    };
                    return {
                        ...acc,
                        daily: false, mall: false, water: false, base: false, ops: false, event: false,
                        pack: processNum(acc.pack),
                        mine1: processNum(acc.mine1)
                    };
                });
                saveAndState(newAccounts);
                notify('換日完成且已儲存！✨');
            };

            const handleToggle = (id, key) => {
                const newAccs = accounts.map(acc => 
                    acc.id === id ? { ...acc, [key]: !acc[key] } : acc
                );
                saveAndState(newAccs);
            };

            const handleNumChange = (id, key, val) => {
                const cleaned = val.replace(/\D/g, '');
                const newAccs = accounts.map(acc => 
                    acc.id === id ? { ...acc, [key]: cleaned } : acc
                );
                saveAndState(newAccs);
            };

            const handleNameChange = (id, val) => {
                const newAccs = accounts.map(acc => 
                    acc.id === id ? { ...acc, name: val } : acc
                );
                saveAndState(newAccs);
            };

            const handleColLabelChange = (index, val) => {
                const newCols = [...cols];
                newCols[index].label = val;
                saveAndState(null, undefined, newCols);
            };

            return (
                <div className="p-3 md:p-8 max-w-6xl mx-auto space-y-5">
                    {notif && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 bg-white px-6 py-2 rounded-full shadow-2xl border border-pink-200 text-pink-600 font-bold z-50 animate-bounce">
                            {notif}
                        </div>
                    )}

                    <header className="flex flex-col md:flex-row items-center justify-between gap-4 bg-white/80 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border border-pink-100">
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <span className="text-2xl">🌸</span>
                            <input 
                                value={appTitle}
                                onChange={(e) => saveAndState(null, e.target.value)}
                                className="text-2xl font-black text-pink-600 bg-transparent border-none focus:outline-none w-full"
                            />
                        </div>
                        <button onClick={resetAll} className="bg-pink-500 text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-pink-200 hover:bg-pink-600 active:scale-95 transition-all flex items-center gap-2 whitespace-nowrap">
                            <Icons.RotateCcw /> 換日重置並儲存
                        </button>
                    </header>

                    <div className="bg-white/90 rounded-[2.5rem] shadow-2xl border border-white overflow-hidden">
                        <div className="overflow-x-auto overflow-y-auto max-h-[72vh]">
                            <table className="w-full text-sm">
                                <thead className="sticky top-0 bg-pink-50/95 backdrop-blur-sm z-30">
                                    <tr>
                                        <th className="p-4 text-left text-pink-800 w-[150px] sticky left-0 bg-pink-50 shadow-[2px_0_5px_rgba(0,0,0,0.05)]">帳號名稱</th>
                                        {cols.map((c, i) => (
                                            <th key={c.key} className="p-2 text-center min-w-[95px]">
                                                <input 
                                                    value={c.label}
                                                    onChange={(e) => handleColLabelChange(i, e.target.value)}
                                                    className="bg-transparent text-center font-bold text-pink-600 w-full"
                                                />
                                            </th>
                                        ))}
                                        <th className="w-12"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-pink-50">
                                    {accounts.map((acc) => (
                                        <tr key={acc.id} className="hover:bg-pink-50/40 transition-colors">
                                            <td className="p-3 sticky left-0 bg-white shadow-[2px_0_5px_rgba(0,0,0,0.02)] z-10">
                                                <input 
                                                    value={acc.name}
                                                    onChange={(e) => handleNameChange(acc.id, e.target.value)}
                                                    className="bg-transparent w-full font-medium text-slate-700"
                                                />
                                            </td>
                                            {cols.map((c) => (
                                                <td key={c.key} className="p-2 text-center">
                                                    {c.type === 'bool' ? (
                                                        <button 
                                                            onClick={() => handleToggle(acc.id, c.key)}
                                                            className={`w-9 h-9 rounded-xl mx-auto flex items-center justify-center transition-all ${acc[c.key] ? 'bg-pink-500 text-white shadow-md' : 'bg-slate-100 text-slate-200 hover:bg-pink-100'}`}
                                                        >
                                                            {acc[c.key] && <Icons.Check />}
                                                        </button>
                                                    ) : (
                                                        <div className="flex items-center justify-center gap-1">
                                                            <input 
                                                                value={acc[c.key] || ''}
                                                                onChange={(e) => handleNumChange(acc.id, c.key, e.target.value)}
                                                                className="w-12 bg-white border border-pink-100 rounded-lg py-1.5 text-center font-mono text-pink-600"
                                                                placeholder="-"
                                                            />
                                                            <span className="text-[10px] text-pink-300 font-bold">D</span>
                                                        </div>
                                                    )}
                                                </td>
                                            ))}
                                            <td className="p-2 text-center">
                                                <button 
                                                    onClick={() => {
                                                        if(confirm('確定要刪除這筆資料嗎？'))
                                                        saveAndState(accounts.filter(a => a.id !== acc.id));
                                                    }}
                                                    className="text-slate-200 hover:text-rose-400 transition-colors p-1"
                                                >
                                                    <Icons.Trash2 />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <button 
                            onClick={() => saveAndState([...accounts, { id: Date.now().toString(), name: '新帳號', daily: false, weekly: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '' }])}
                            className="w-full py-5 border-t border-dashed border-pink-100 text-pink-300 hover:bg-pink-50 hover:text-pink-500 transition-all font-bold flex items-center justify-center gap-2"
                        >
                            <Icons.PlusCircle /> 點擊新增成員
                        </button>
                    </div>

                    <footer className="text-center text-[11px] text-pink-400 font-medium">
                        ✨ 資料已即時儲存於您的瀏覽器 ✨
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
