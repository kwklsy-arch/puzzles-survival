<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 末日進度追蹤</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel (將 JSX 轉換為瀏覽器認識的 JS) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-50 to-pink-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 預設資料 ---
        const defaultData = [
            { id: '1', name: '雪隨風飄', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '23', mine1: '25' },
            { id: '2', name: '°ǒ雨醉伴花眠ǒ°', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '10', mine1: '25' },
            { id: '3', name: '煙火消逝的瞬間͜⁎✿', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '28', mine1: '25' },
            { id: '4', name: '福壽山蜜蘋果･ω･', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '', mine1: '' },
            { id: '5', name: '拉拉山水蜜桃･ὢ･', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '', mine1: '' },
            { id: '6', name: '好好吃的芭樂', daily: true, weekly: true, mall: true, base: true, ops: true, event: true, water: true, pack: '19', mine1: '19' },
            { id: '10', name: '小小1號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '20', mine1: '20' },
            { id: '11', name: '小小2號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '6', mine1: '20' },
            { id: '12', name: '小小3號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '20', mine1: '22' },
            { id: '13', name: '小小4號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '26', mine1: '20' },
            { id: '14', name: '小小5號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '24', mine1: '11' },
            { id: '15', name: '小小6號', daily: true, weekly: false, mall: true, base: true, ops: true, event: true, water: true, pack: '22', mine1: '22' },
        ];

        const defaultColumns = [
            { key: 'daily', label: '每日', type: 'bool' },
            { key: 'weekly', label: '周任', type: 'bool' },
            { key: 'mall', label: '商城', type: 'bool' },
            { key: 'base', label: '基地', type: 'bool' },
            { key: 'ops', label: '特作', type: 'bool' },
            { key: 'event', label: '節日', type: 'bool' },
            { key: 'water', label: '淨水', type: 'bool' },
            { key: 'pack', label: '救援包', type: 'number' },
            { key: 'mine1', label: '黃金礦', type: 'number' },
        ];

        // --- 圖示組件 ---
        const Icons = {
            Check: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Rotate: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
            Plus: ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            User: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>,
            Upload: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        };

        function App() {
            const [accounts, setAccounts] = useState(defaultData);
            const [appTitle, setAppTitle] = useState('🌸 末日進度追蹤');
            const [taskColumns, setTaskColumns] = useState(defaultColumns);
            const [showImportModal, setShowImportModal] = useState(false);
            const [importText, setImportText] = useState('');
            const [notification, setNotification] = useState('');

            // 儲存邏輯 (GitHub 模式下存到 LocalStorage)
            useEffect(() => {
                const saved = localStorage.getItem('puzzles_survival_data');
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.accounts) setAccounts(parsed.accounts);
                        if (parsed.appTitle) setAppTitle(parsed.appTitle);
                        if (parsed.taskColumns) setTaskColumns(parsed.taskColumns);
                    } catch(e) { console.error(e); }
                }
            }, []);

            const saveData = (newAccounts, newTitle, newColumns) => {
                const updatedAcc = newAccounts || accounts;
                const updatedTitle = newTitle !== undefined && newTitle !== null ? newTitle : appTitle;
                const updatedCols = newColumns || taskColumns;
                
                setAccounts([...updatedAcc]);
                setAppTitle(updatedTitle);
                setTaskColumns([...updatedCols]);
                
                localStorage.setItem('puzzles_survival_data', JSON.stringify({
                    accounts: updatedAcc,
                    appTitle: updatedTitle,
                    taskColumns: updatedCols
                }));
            };

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 3000);
            };

            const resetDaily = () => {
                const newAccounts = accounts.map(acc => {
                    const decr = (val) => {
                        if (!val || val === '') return '';
                        const num = parseInt(val, 10);
                        return isNaN(num) ? '' : (num <= 1 ? '30' : (num - 1).toString());
                    };
                    return {
                        ...acc,
                        daily: false, mall: false, water: false, base: false, ops: false, event: false,
                        pack: decr(acc.pack), mine1: decr(acc.mine1),
                    };
                });
                saveData(newAccounts);
                showNotify('換日重置成功！💞');
            };

            return (
                <div className="p-2 md:p-6 text-slate-700">
                    {notification && (
                        <div className="fixed top-4 right-4 z-[100] bg-pink-500 text-white px-4 py-2 rounded-full shadow-lg flex items-center gap-2 animate-bounce text-sm">
                            <span>{notification}</span>
                        </div>
                    )}

                    <div className="max-w-6xl mx-auto space-y-4">
                        <div className="flex items-center justify-between gap-2 bg-white/80 backdrop-blur-md px-4 py-3 rounded-2xl shadow-sm border border-pink-100 sticky top-0 z-50">
                            <input
                                type="text"
                                value={appTitle}
                                onChange={(e) => saveData(null, e.target.value)}
                                className="bg-transparent border-none focus:outline-none text-lg md:text-xl font-black text-pink-600 w-full truncate"
                            />
                            <div className="flex items-center gap-2">
                                <button onClick={resetDaily} className="bg-pink-500 text-white px-3 py-2 rounded-xl font-bold text-xs flex items-center gap-1 shadow-md">
                                    <Icons.Rotate /> 換日
                                </button>
                                <button onClick={() => setShowImportModal(true)} className="p-2 text-pink-400 hover:bg-pink-100 rounded-xl transition-colors">
                                    <Icons.Upload />
                                </button>
                            </div>
                        </div>

                        {/* 電腦版表格 */}
                        <div className="hidden md:block bg-white/50 backdrop-blur-sm rounded-3xl shadow-xl border border-pink-50 overflow-hidden">
                            <table className="w-full text-left border-collapse">
                                <thead className="bg-pink-50/90">
                                    <tr>
                                        <th className="px-4 py-4 font-bold text-pink-700 w-[160px]">角色名稱</th>
                                        {taskColumns.map(col => (
                                            <th key={col.key} className="px-1 py-4 text-center min-w-[60px] text-pink-700 font-bold text-xs">
                                                {col.label}
                                            </th>
                                        ))}
                                        <th className="w-10"></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-pink-50">
                                    {accounts.map((acc) => (
                                        <tr key={acc.id} className="bg-white/40 hover:bg-white/80 transition-colors">
                                            <td className="px-4 py-2">
                                                <input
                                                    type="text"
                                                    value={acc.name}
                                                    onChange={(e) => saveData(accounts.map(a => a.id === acc.id ? {...a, name: e.target.value} : a))}
                                                    className="bg-transparent w-full font-medium"
                                                />
                                            </td>
                                            {taskColumns.map(col => (
                                                <td key={col.key} className="px-1 py-2 text-center">
                                                    {col.type === 'bool' ? (
                                                        <button
                                                            onClick={() => saveData(accounts.map(a => a.id === acc.id ? {...a, [col.key]: !a[col.key]} : a))}
                                                            className={`w-8 h-8 mx-auto rounded-xl flex items-center justify-center transition-all ${acc[col.key] ? 'bg-pink-500 text-white' : 'bg-slate-100 text-slate-200'}`}
                                                        >
                                                            {acc[col.key] && <Icons.Check />}
                                                        </button>
                                                    ) : (
                                                        <input
                                                            type="text"
                                                            value={acc[col.key] || ''}
                                                            onChange={(e) => saveData(accounts.map(a => a.id === acc.id ? {...a, [col.key]: e.target.value.replace(/\D/g,'')} : a))}
                                                            className="w-10 bg-white border border-pink-50 rounded-lg py-1 text-center text-pink-600 text-xs"
                                                        />
                                                    )}
                                                </td>
                                            ))}
                                            <td className="px-2">
                                                <button onClick={() => saveData(accounts.filter(a => a.id !== acc.id))} className="text-slate-200 hover:text-rose-400">
                                                    <Icons.Trash />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* 手機版 */}
                        <div className="md:hidden space-y-3 pb-24">
                            {accounts.map((acc) => (
                                <div key={acc.id} className="bg-white rounded-3xl p-4 shadow-sm border border-pink-50">
                                    <div className="flex items-center justify-between mb-3 border-b border-pink-50 pb-2">
                                        <div className="flex items-center gap-2">
                                            <Icons.User />
                                            <input type="text" value={acc.name} onChange={(e) => saveData(accounts.map(a => a.id === acc.id ? {...a, name: e.target.value} : a))} className="font-bold text-slate-700" />
                                        </div>
                                        <button onClick={() => saveData(accounts.filter(a => a.id !== acc.id))} className="text-slate-200"><Icons.Trash /></button>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {taskColumns.map(col => (
                                            <div key={col.key} className="flex flex-col items-center p-2 rounded-2xl bg-slate-50 border border-slate-100">
                                                <span className="text-[10px] text-slate-400 font-bold mb-1">{col.label}</span>
                                                {col.type === 'bool' ? (
                                                    <button onClick={() => saveData(accounts.map(a => a.id === acc.id ? {...a, [col.key]: !a[col.key]} : a))} className={`w-10 h-10 rounded-xl flex items-center justify-center ${acc[col.key] ? 'bg-pink-500 text-white shadow-md' : 'bg-white border border-slate-200 text-slate-100'}`}>
                                                        {acc[col.key] && <Icons.Check />}
                                                    </button>
                                                ) : (
                                                    <input type="text" value={acc[col.key] || ''} onChange={(e) => saveData(accounts.map(a => a.id === acc.id ? {...a, [col.key]: e.target.value.replace(/\D/g,'')} : a))} className="w-12 bg-white border border-slate-200 rounded-lg py-1.5 text-center text-pink-600 text-xs" />
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <button onClick={() => {
                            const newId = Date.now().toString();
                            saveData([...accounts, { id: newId, name: '新角色', daily: false, weekly: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '' }]);
                        }} className="w-full py-4 bg-white border-2 border-dashed border-pink-200 rounded-2xl text-pink-500 font-bold flex items-center justify-center gap-2">
                            <Icons.Plus /> 新增角色
                        </button>
                    </div>

                    {showImportModal && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6">
                                <h3 className="text-pink-500 font-bold mb-4 flex items-center gap-2"><Icons.Upload /> 備份與還原</h3>
                                <textarea
                                    value={importText}
                                    onChange={(e) => setImportText(e.target.value)}
                                    className="w-full h-48 bg-slate-50 border border-slate-100 rounded-2xl p-4 text-xs font-mono mb-4 focus:ring-2 focus:ring-pink-200 focus:outline-none"
                                    placeholder='在此貼上備份 JSON 代碼...'
                                ></textarea>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={() => { setImportText(JSON.stringify({accounts, appTitle, taskColumns})); showNotify('已生成代碼！'); }} className="py-3 text-pink-600 font-bold text-sm bg-white rounded-xl border border-pink-100">生成備份</button>
                                    <button onClick={() => {
                                        try {
                                            const p = JSON.parse(importText);
                                            saveData(p.accounts, p.appTitle, p.taskColumns);
                                            setShowImportModal(false);
                                            showNotify('還原成功！');
                                        } catch(e) { showNotify('格式錯誤！'); }
                                    }} className="py-3 bg-pink-500 text-white rounded-xl font-bold text-sm">執行還原</button>
                                </div>
                                <button onClick={() => setShowImportModal(false)} className="w-full mt-4 text-slate-400 text-xs">取消</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
