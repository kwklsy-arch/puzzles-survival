<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🌸 末日全能追蹤 - 旗艦版</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* 迫切提醒動畫 */
        @keyframes pulse-warning {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .urgent-ring { animation: pulse-warning 2s infinite; }
    </style>
</head>
<body class="pb-24">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback } = React;

        const STORAGE_KEY = 'puzzles_survival_v16_pro';
        const CYCLE_WEEKS = ["最強指揮官週", "王牌英雄週"];
        
        const TASK_DETAILS = {
            "最強指揮官週": {
                1: { name: "英雄崛起", tip: "抽英雄、升級奈米武器" },
                2: { name: "發展之路", tip: "建築、科技、採集" },
                3: { name: "獵殺之路", tip: "體力消耗、打怪" },
                4: { name: "練兵大師", tip: "大量爆兵" },
                5: { name: "器官精造", tip: "強化器官" },
                6: { name: "強化改造", tip: "全能強化日" },
                0: { name: "終極之路", tip: "全能積分日" }
            },
            "王牌英雄週": {
                1: { name: "英雄提升", tip: "提升英雄等級/星級" },
                2: { name: "避難所發展", tip: "建築與科技研究" },
                3: { name: "裝備晶核", tip: "強化裝備/晶核/藏品" },
                4: { name: "生化元件", tip: "生化人/元件強化" },
                5: { name: "器官榮耀", tip: "器官與榮耀等級" },
                6: { name: "鑽石消耗", tip: "消費鑽石換積分" },
                0: { name: "全能發展", tip: "晶片/魔方/鑽石" }
            }
        };

        const decrementVal = (v) => {
            const n = parseInt(v, 10);
            return isNaN(n) ? "" : Math.max(0, n - 1).toString();
        };

        function App() {
            const [groups, setGroups] = useState([]);
            const [appTitle, setAppTitle] = useState('🌸 末日全能追蹤');
            const [customEvent, setCustomEvent] = useState('週六真武');
            const [view, setView] = useState('main'); // 'main' or 'settings'
            const [prisonTimer, setPrisonTimer] = useState("");
            const [notification, setNotification] = useState(null);
            const [hideDone, setHideDone] = useState(false);

            // 初始化與讀取
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                let data = saved ? JSON.parse(saved) : { groups: [], appTitle: '🌸 末日全能追蹤', customEvent: '週六真武' };
                
                // 檢查每日重置 (8:00 AM)
                const lastReset = localStorage.getItem(STORAGE_KEY + '_reset');
                const now = new Date();
                const resetLine = new Date();
                resetLine.setHours(8, 0, 0, 0);
                if (now < resetLine) resetLine.setDate(resetLine.getDate() - 1);

                if (!lastReset || parseInt(lastReset) < resetLine.getTime()) {
                    data.groups = (data.groups.length ? data.groups : []).map(g => ({
                        ...g, accounts: g.accounts.map(a => ({
                            ...a, daily: false, cmd: false, hero: false, mall: false, 
                            seed: false, spec: false, pass: false, water: false, 
                            dyTask: false, cuEvent: false,
                            pack: decrementVal(a.pack), mine: decrementVal(a.mine), crys: decrementVal(a.crys)
                        }))
                    }));
                    localStorage.setItem(STORAGE_KEY + '_reset', resetLine.getTime().toString());
                    setNotification("🌅 早安！任務已自動重置。");
                }

                setGroups(data.groups);
                setAppTitle(data.appTitle);
                setCustomEvent(data.customEvent);

                const timer = setInterval(updatePrison, 1000);
                return () => clearInterval(timer);
            }, []);

            const updatePrison = () => {
                const cycle = 3 * 24 * 3600 * 1000;
                const anchor = Date.UTC(2026, 3, 19, 0, 0, 0); 
                const diff = ((anchor - Date.now()) % cycle + cycle) % cycle;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                setPrisonTimer(`${d}天 ${h}時 ${m}分 ${s}秒`);
            };

            const save = (g, t, c) => {
                const payload = { groups: g || groups, appTitle: t || appTitle, customEvent: c || customEvent };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
            };

            const isAccDone = (a) => (a.daily && a.cmd && a.hero && a.mall && a.seed && a.spec && a.pass && a.water && a.dyTask && a.cuEvent);

            const toggleAcc = (gid, aid, key) => {
                const next = groups.map(g => g.id === gid ? {
                    ...g, accounts: g.accounts.map(a => a.id === aid ? {...a, [key]: !a[key]} : a)
                } : g);
                setGroups(next);
                save(next);
            };

            const quickClear = (gid, aid) => {
                const next = groups.map(g => g.id === gid ? {
                    ...g, accounts: g.accounts.map(a => a.id === aid ? {
                        ...a, daily:true, cmd:true, hero:true, mall:true, seed:true, spec:true, pass:true, water:true, dyTask:true, cuEvent:true
                    } : a)
                } : g);
                setGroups(next);
                save(next);
                setNotification("⚡ 已一鍵完成該角色任務！");
            };

            const weekNum = useMemo(() => {
                const d = new Date();
                d.setHours(0,0,0,0);
                d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
                const w1 = new Date(d.getFullYear(), 0, 4);
                return 1 + Math.round(((d.getTime() - w1.getTime()) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
            }, []);

            const currentWeek = CYCLE_WEEKS[weekNum % 2];
            const todayIdx = new Date().getDay();
            const todayTask = TASK_DETAILS[currentWeek][todayIdx];

            return (
                <div className="max-w-4xl mx-auto px-4 pt-6 space-y-6">
                    {/* 通知彈窗 */}
                    {notification && (
                        <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-800 text-white px-6 py-3 rounded-full shadow-xl text-sm font-bold border border-white/20 animate-fade-in">
                            {notification}
                            <button className="ml-4 opacity-50" onClick={() => setNotification(null)}>✕</button>
                        </div>
                    )}

                    {/* 頂部概覽 */}
                    <header className="glass-card rounded-[2rem] p-6 shadow-xl space-y-4 sticky top-4 z-40">
                        <div className="flex justify-between items-start">
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 flex items-center gap-2">
                                    {appTitle} <i className="fa-solid fa-bolt-lightning text-amber-400"></i>
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 mt-1 uppercase tracking-widest">Puzzles & Survival Tracker Pro</p>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setHideDone(!hideDone)} className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${hideDone ? 'bg-indigo-500 text-white shadow-lg' : 'bg-slate-100 text-slate-500'}`}>
                                    <i className={`fa-solid ${hideDone ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                                </button>
                                <button onClick={() => setView(view === 'main' ? 'settings' : 'main')} className="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center">
                                    <i className={`fa-solid ${view === 'main' ? 'fa-gear' : 'fa-house'}`}></i>
                                </button>
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-3">
                            <div className="bg-indigo-50 p-3 rounded-2xl border border-indigo-100">
                                <p className="text-[10px] font-bold text-indigo-400 mb-1">📅 {currentWeek}</p>
                                <p className="text-sm font-black text-indigo-700">{todayTask.name}</p>
                                <p className="text-[9px] text-indigo-500 mt-0.5 opacity-70">💡 {todayTask.tip}</p>
                            </div>
                            <div className={`p-3 rounded-2xl border transition-all ${prisonTimer.startsWith('0天') ? 'bg-red-50 border-red-200 urgent-ring' : 'bg-emerald-50 border-emerald-100'}`}>
                                <p className="text-[10px] font-bold text-slate-400 mb-1">⏳ 監獄訓練倒數</p>
                                <p className={`text-sm font-black ${prisonTimer.startsWith('0天') ? 'text-red-600' : 'text-emerald-700'}`}>{prisonTimer}</p>
                            </div>
                        </div>
                    </header>

                    {view === 'main' ? (
                        <main className="space-y-6">
                            {groups.map(g => {
                                const list = hideDone ? g.accounts.filter(a => !isAccDone(a)) : g.accounts;
                                if (hideDone && list.length === 0) return null;
                                return (
                                    <section key={g.id} className="space-y-3">
                                        <div className="flex items-center justify-between px-2">
                                            <h2 className="font-black text-slate-700 flex items-center gap-2 text-lg">
                                                <i className="fa-solid fa-folder-open text-pink-400 text-sm"></i> {g.title}
                                            </h2>
                                            <span className="text-[10px] font-bold bg-slate-200 text-slate-500 px-3 py-1 rounded-full">{list.length} 個角色</span>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {list.map(a => {
                                                const done = isAccDone(a);
                                                return (
                                                    <div key={a.id} className={`glass-card rounded-[2.5rem] p-5 transition-all duration-500 ${done ? 'opacity-40 grayscale-[0.3]' : 'shadow-md border-pink-100'}`}>
                                                        <div className="flex justify-between items-center mb-4">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-black text-xs ${done ? 'bg-emerald-500' : 'bg-gradient-to-br from-pink-400 to-rose-500'}`}>
                                                                    {a.name.substring(0,1)}
                                                                </div>
                                                                <span className="font-black text-slate-700">{a.name}</span>
                                                            </div>
                                                            <button 
                                                                onClick={() => quickClear(g.id, a.id)}
                                                                className={`px-3 py-1.5 rounded-full text-[10px] font-black transition-all ${done ? 'bg-emerald-100 text-emerald-600' : 'bg-amber-100 text-amber-600 active:scale-95'}`}
                                                            >
                                                                {done ? '已全清' : '⚡ 一鍵完成'}
                                                            </button>
                                                        </div>

                                                        {/* 主要按鈕組 */}
                                                        <div className="grid grid-cols-2 gap-2 mb-4">
                                                            <button onClick={() => toggleAcc(g.id, a.id, 'dyTask')} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all border ${a.dyTask ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-indigo-100 text-indigo-400'}`}>
                                                                <span className="text-[9px] font-black uppercase">今日目標</span>
                                                                <span className="text-xs font-bold truncate w-full">{todayTask.name}</span>
                                                            </button>
                                                            <button onClick={() => toggleAcc(g.id, a.id, 'cuEvent')} className={`p-3 rounded-2xl flex flex-col items-center gap-1 transition-all border ${a.cuEvent ? 'bg-rose-500 border-rose-500 text-white' : 'bg-white border-rose-100 text-rose-400'}`}>
                                                                <span className="text-[9px] font-black uppercase">限定活動</span>
                                                                <span className="text-xs font-bold truncate w-full">{customEvent}</span>
                                                            </button>
                                                        </div>

                                                        {/* 小按鈕格 */}
                                                        <div className="grid grid-cols-4 gap-2">
                                                            {[
                                                                {k:'daily', l:'日常'}, {k:'cmd', l:'扭蛋'}, {k:'hero', l:'巔峰'}, {k:'mall', l:'商城領獎'},
                                                                {k:'seed', l:'種子'}, {k:'spec', l:'特種'}, {k:'pass', l:'通行證'}, {k:'water', l:'淨水'}
                                                            ].map(item => (
                                                                <button key={item.k} onClick={() => toggleAcc(g.id, a.id, item.k)} className={`aspect-square rounded-2xl flex flex-col items-center justify-center gap-1 transition-all border ${a[item.k] ? 'bg-slate-800 border-slate-800 text-white' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>
                                                                    <span className="text-[9px] font-black">{item.l}</span>
                                                                    {a[item.k] ? <i className="fa-solid fa-circle-check text-[10px]"></i> : <i className="fa-regular fa-circle text-[10px] opacity-30"></i>}
                                                                </button>
                                                            ))}
                                                        </div>

                                                        {/* 天數輸入 */}
                                                        <div className="grid grid-cols-3 gap-3 mt-4">
                                                            {[
                                                                {k:'pack', l:'救援包'}, {k:'mine', l:'金礦'}, {k:'crys', l:'晶核'}
                                                            ].map(item => {
                                                                const isWait = a[item.k] === '0';
                                                                return (
                                                                    <div key={item.k} className="flex flex-col gap-1">
                                                                        <span className="text-[9px] font-bold text-slate-400 text-center">{item.l}</span>
                                                                        <div className={`h-10 rounded-xl flex items-center justify-center border transition-all ${isWait ? 'bg-red-500 border-red-500 animate-pulse' : 'bg-slate-100 border-slate-200'}`}>
                                                                            <input 
                                                                                type="text" 
                                                                                value={isWait ? '領獎' : a[item.k]}
                                                                                placeholder="-"
                                                                                onChange={(e) => {
                                                                                    const val = e.target.value.replace(/\D/g,'');
                                                                                    toggleAcc(g.id, a.id, item.k === 'pack' ? {pack: val} : item.k === 'mine' ? {mine: val} : {crys: val});
                                                                                    const next = groups.map(gr => gr.id === g.id ? {
                                                                                        ...gr, accounts: gr.accounts.map(acc => acc.id === a.id ? {...acc, [item.k]: val} : acc)
                                                                                    } : gr);
                                                                                    setGroups(next); save(next);
                                                                                }}
                                                                                onFocus={(e) => { if(isWait) { 
                                                                                    const next = groups.map(gr => gr.id === g.id ? {
                                                                                        ...gr, accounts: gr.accounts.map(acc => acc.id === a.id ? {...acc, [item.k]: '30'} : acc)
                                                                                    } : gr);
                                                                                    setGroups(next); save(next);
                                                                                    setNotification(`${a.name} 已重置為 30 天`);
                                                                                } else { e.target.select(); }}}
                                                                                className={`w-full bg-transparent text-center text-xs font-black outline-none ${isWait ? 'text-white' : 'text-slate-700'}`}
                                                                            />
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </section>
                                );
                            })}
                        </main>
                    ) : (
                        <div className="animate-fade-in space-y-6">
                            <section className="glass-card rounded-[2.5rem] p-6 space-y-4">
                                <h3 className="font-black text-slate-700 flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-pink-400"></i> 全局設定</h3>
                                <div className="space-y-3">
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-2">標題名稱</label>
                                        <input type="text" value={appTitle} onChange={(e) => {setAppTitle(e.target.value); save(null, e.target.value);}} className="w-full bg-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 ring-pink-400" />
                                    </div>
                                    <div className="flex flex-col gap-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-2">今日限定活動</label>
                                        <input type="text" value={customEvent} onChange={(e) => {setCustomEvent(e.target.value); save(null, null, e.target.value);}} className="w-full bg-slate-100 rounded-2xl p-4 text-sm font-bold outline-none focus:ring-2 ring-pink-400" />
                                    </div>
                                </div>
                            </section>

                            <section className="glass-card rounded-[2.5rem] p-6">
                                <h3 className="font-black text-slate-700 flex items-center gap-2 mb-4"><i className="fa-solid fa-users-gear text-indigo-400"></i> 管理群組</h3>
                                <button onClick={() => {
                                    const title = prompt("輸入群組名稱");
                                    if(title) {
                                        const next = [...groups, { id: Date.now().toString(), title, accounts: [] }];
                                        setGroups(next); save(next);
                                    }
                                }} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg mb-4">＋ 新增伺服器群組</button>
                                
                                <div className="space-y-2">
                                    {groups.map(g => (
                                        <div key={g.id} className="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-2xl">
                                            <span className="font-bold text-sm text-slate-600">{g.title}</span>
                                            <div className="flex gap-1">
                                                <button onClick={() => {
                                                    const name = prompt("角色名稱");
                                                    if(name) {
                                                        const next = groups.map(gr => gr.id === g.id ? {...gr, accounts: [...gr.accounts, {id: Date.now().toString(), name, daily:false, cmd:false, hero:false, mall:false, seed:false, spec:false, pass:false, water:false, dyTask:false, cuEvent:false, pack:'', mine:'', crys:''}]} : gr);
                                                        setGroups(next); save(next);
                                                    }
                                                }} className="w-8 h-8 rounded-full bg-pink-50 text-pink-500 flex items-center justify-center text-xs"><i className="fa-solid fa-user-plus"></i></button>
                                                <button onClick={() => {
                                                    if(confirm("確定刪除此群組？")) {
                                                        const next = groups.filter(gr => gr.id !== g.id);
                                                        setGroups(next); save(next);
                                                    }
                                                }} className="w-8 h-8 rounded-full bg-slate-50 text-slate-300 flex items-center justify-center text-xs"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>

                            <section className="glass-card rounded-[2.5rem] p-6 text-center">
                                <h3 className="font-black text-slate-700 mb-2">數據備份</h3>
                                <p className="text-[10px] text-slate-400 mb-4">建議定期複製代碼存放在 Line 或記事本</p>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => {
                                        const code = localStorage.getItem(STORAGE_KEY);
                                        const textArea = document.createElement("textarea");
                                        textArea.value = code;
                                        document.body.appendChild(textArea);
                                        textArea.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(textArea);
                                        setNotification("✅ 資料已複製到剪貼簿！");
                                    }} className="py-3 bg-slate-800 text-white rounded-2xl text-xs font-black">複製導出碼</button>
                                    <button onClick={() => {
                                        const code = prompt("請貼上導出碼：");
                                        if(code) {
                                            try {
                                                const p = JSON.parse(code);
                                                setGroups(p.groups); setAppTitle(p.appTitle); setCustomEvent(p.customEvent);
                                                localStorage.setItem(STORAGE_KEY, code);
                                                setNotification("📥 導入完成！");
                                            } catch(e) { alert("格式錯誤！"); }
                                        }
                                    }} className="py-3 bg-white border-2 border-slate-800 text-slate-800 rounded-2xl text-xs font-black">導入資料</button>
                                </div>
                            </section>
                        </div>
                    )}

                    {/* 底部導覽欄 */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-card border-t border-slate-200 px-8 py-4 flex justify-around items-center z-50 rounded-t-[2rem]">
                        <button onClick={() => setView('main')} className={`flex flex-col items-center gap-1 ${view === 'main' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-house-chimney text-lg"></i>
                            <span className="text-[9px] font-black">首頁</span>
                        </button>
                        <button onClick={() => setView('settings')} className={`flex flex-col items-center gap-1 ${view === 'settings' ? 'text-indigo-600' : 'text-slate-400'}`}>
                            <i className="fa-solid fa-sliders text-lg"></i>
                            <span className="text-[9px] font-black">管理</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
