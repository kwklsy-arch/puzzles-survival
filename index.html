<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌸 末日分組追蹤</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 載入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 載入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 載入 SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @keyframes pulse-red {
            0%, 100% { background-color: #fee2e2; border-color: #ef4444; }
            50% { background-color: #fecaca; border-color: #dc2626; }
        }
        .animate-urgent {
            animation: pulse-red 2s infinite;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            touch-action: manipulation;
        }
        /* 拖拽樣式 */
        .sortable-ghost { opacity: 0.2; background: #fbcfe8 !important; }
        .group-ghost { opacity: 0.3; border: 2px dashed #ec4899; }
        
        /* 隱藏滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-pink-50 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const STORAGE_KEY = 'puzzles_survival_v6_grouped';

        // 預設分組資料
        const initialGroups = [
            {
                id: 'g1',
                title: '382服 WTF',
                isOpen: true,
                accounts: [
                    { id: 'a1', name: '飄落的蒲公英 ҉͜', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a2', name: '☪淺月夜未央︎৯', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a3', name: '︎৯月夜舞盡離☪', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            },
            {
                id: 'g2',
                title: '382服 KTV',
                isOpen: true,
                accounts: [
                    { id: 'a4', name: '好好吃的芭樂', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            },
            {
                id: 'g3',
                title: '464服 13K',
                isOpen: true,
                accounts: [
                    { id: 'a5', name: '✿花落隨風飄❀', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            },
            {
                id: 'g4',
                title: '538服 WTF',
                isOpen: true,
                accounts: [
                    { id: 'a6', name: '小小1號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a7', name: '小小2號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a8', name: '小小3號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a9', name: '小小4號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a10', name: '小小5號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a11', name: '小小6號', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            },
            {
                id: 'g5',
                title: '538服 mia',
                isOpen: true,
                accounts: [
                    { id: 'a12', name: '雪隨風飄', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a13', name: '°ǒ雨醉伴花眠ǒ°', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a14', name: '煙火消逝的瞬間⁎✿', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a15', name: '福壽山蜜蘋果･ω･', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a16', name: '拉拉山水蜜桃･ὢ･', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            },
            {
                id: 'g6',
                title: '538服 TPM',
                isOpen: true,
                accounts: [
                    { id: 'a17', name: '༺జ南南の雲జ༻', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' },
                    { id: 'a18', name: '༺జ南南の王牌జ༻', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }
                ]
            }
        ];

        const taskKeys = [
            { key: 'daily', label: '每日' },
            { key: 'commander', label: '指揮官' },
            { key: 'hero', label: '英雄周' },
            { key: 'mall', label: '商城' },
            { key: 'base', label: '種子' },
            { key: 'ops', label: '特種' },
            { key: 'event', label: '節日' },
            { key: 'water', label: '淨水' },
        ];

        const countKeys = [
            { key: 'pack', label: '救援包' },
            { key: 'mine1', label: '金礦' },
            { key: 'crystal', label: '晶核' },
        ];

        const Icons = {
            ChevronDown: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
            ChevronRight: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>,
            Check: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>,
            Rotate: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>,
            Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Trash: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>,
            Folder: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>,
            Sync: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>,
            Drag: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="opacity-30"><circle cx="9" cy="12" r="1"/><circle cx="9" cy="5" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="19" r="1"/></svg>
        };

        function App() {
            const [groups, setGroups] = useState([]);
            const [appTitle, setAppTitle] = useState('🌸 末日帳號管理系統');
            const [notification, setNotification] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [backupText, setBackupText] = useState('');
            
            const containerRef = useRef(null);
            const groupRefs = useRef({});

            // 初始化載入
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed.groups)) setGroups(parsed.groups);
                        if (parsed.appTitle) setAppTitle(parsed.appTitle);
                    } catch(e) { setGroups(initialGroups); }
                } else {
                    setGroups(initialGroups);
                }
            }, []);

            // 儲存函數
            const persist = (newGroups, newTitle) => {
                const g = newGroups || groups;
                const t = newTitle !== undefined ? newTitle : appTitle;
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ groups: g, appTitle: t }));
            };

            const showNotify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(''), 2500);
            };

            // 角色卡片邏輯
            const updateAccount = (groupId, accId, fields) => {
                const newGroups = groups.map(g => {
                    if (g.id !== groupId) return g;
                    return {
                        ...g,
                        accounts: g.accounts.map(a => a.id === accId ? { ...a, ...fields } : a)
                    };
                });
                setGroups(newGroups);
                persist(newGroups);
            };

            // 換日重置
            const handleResetAll = () => {
                if(!confirm("確定要重置所有帳號的每日任務嗎？")) return;
                const newGroups = groups.map(g => ({
                    ...g,
                    accounts: g.accounts.map(a => {
                        const dec = (v) => {
                            const n = parseInt(v, 10);
                            return isNaN(n) ? '' : Math.max(0, n - 1).toString();
                        };
                        return {
                            ...a,
                            daily: false, mall: false, water: false, base: false, ops: false, event: false,
                            pack: dec(a.pack), mine1: dec(a.mine1), crystal: dec(a.crystal)
                        };
                    })
                }));
                setGroups(newGroups);
                persist(newGroups);
                showNotify("所有分組已重置成功！🗓️");
            };

            // 分組操作
            const addGroup = () => {
                const newGroups = [...groups, { id: Date.now().toString(), title: '新伺服器/聯盟', isOpen: true, accounts: [] }];
                setGroups(newGroups);
                persist(newGroups);
            };

            const addAccount = (groupId) => {
                const newGroups = groups.map(g => {
                    if (g.id !== groupId) return g;
                    return {
                        ...g,
                        isOpen: true,
                        accounts: [...g.accounts, { id: Date.now().toString(), name: '新角色', daily: false, commander: false, hero: false, mall: false, base: false, ops: false, event: false, water: false, pack: '', mine1: '', crystal: '' }]
                    };
                });
                setGroups(newGroups);
                persist(newGroups);
            };

            // 初始化分組排序 (伺服器大項排序)
            useEffect(() => {
                if (containerRef.current && groups.length > 0) {
                    Sortable.create(containerRef.current, {
                        animation: 150,
                        handle: '.group-handle',
                        ghostClass: 'group-ghost',
                        onEnd: (evt) => {
                            const { oldIndex, newIndex } = evt;
                            if (oldIndex === newIndex) return;
                            setGroups(prev => {
                                const next = [...prev];
                                const [item] = next.splice(oldIndex, 1);
                                next.splice(newIndex, 0, item);
                                persist(next);
                                return next;
                            });
                        }
                    });
                }
            }, [groups.length]);

            // 初始化組內角色排序
            useEffect(() => {
                groups.forEach(group => {
                    const el = groupRefs.current[group.id];
                    if (el && !el.hasSortable) {
                        Sortable.create(el, {
                            animation: 150,
                            handle: '.acc-handle',
                            ghostClass: 'sortable-ghost',
                            group: 'accounts', // 允許跨組拖拽
                            onEnd: (evt) => {
                                // 由於 React 狀態管理的複雜性，跨組拖拽通常需要更複雜的處理
                                // 這裡先實作組內排序
                                if (evt.from === evt.to) {
                                    const gid = evt.from.dataset.id;
                                    setGroups(prev => {
                                        const next = [...prev];
                                        const targetGroup = next.find(g => g.id === gid);
                                        const accs = [...targetGroup.accounts];
                                        const [item] = accs.splice(evt.oldIndex, 1);
                                        accs.splice(evt.newIndex, 0, item);
                                        targetGroup.accounts = accs;
                                        persist(next);
                                        return next;
                                    });
                                }
                            }
                        });
                        el.hasSortable = true;
                    }
                });
            }, [groups]);

            return (
                <div className="p-4 md:p-8 max-w-6xl mx-auto space-y-6">
                    {notification && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-pink-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 animate-bounce">
                            {notification}
                        </div>
                    )}

                    {/* Header */}
                    <div className="bg-white/90 backdrop-blur-md p-5 rounded-[2rem] shadow-sm border border-pink-100 flex flex-col md:flex-row items-center justify-between gap-4 sticky top-4 z-50">
                        <div className="flex items-center gap-3 w-full md:w-auto">
                            <div className="bg-pink-100 p-2 rounded-xl text-pink-500"><Icons.Folder /></div>
                            <input 
                                type="text" 
                                value={appTitle} 
                                onChange={(e) => {setAppTitle(e.target.value); persist(null, e.target.value);}}
                                className="bg-transparent font-black text-xl text-slate-700 outline-none w-full"
                            />
                        </div>
                        <div className="flex items-center gap-2 w-full md:w-auto">
                            <button onClick={handleResetAll} className="flex-1 md:flex-none bg-pink-500 hover:bg-pink-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 shadow-lg transition-all active:scale-95">
                                <Icons.Rotate /> 換日重置
                            </button>
                            <button onClick={() => setShowModal(true)} className="p-2.5 bg-white border border-pink-100 text-pink-400 rounded-xl hover:bg-pink-50 transition-colors">
                                <Icons.Sync />
                            </button>
                        </div>
                    </div>

                    <div className="flex justify-between items-center px-2">
                        <span className="text-[10px] font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-tighter">
                            按住 ≡ 拖拽排序 / 點擊標題收納分組
                        </span>
                        <button onClick={addGroup} className="text-pink-500 text-xs font-bold flex items-center gap-1 hover:underline">
                            <Icons.Plus /> 新增伺服器分組
                        </button>
                    </div>

                    {/* Groups List */}
                    <div ref={containerRef} className="space-y-4">
                        {groups.map(group => (
                            <div key={group.id} className="bg-white/50 border border-white rounded-[2rem] overflow-hidden shadow-sm transition-all">
                                {/* Group Header */}
                                <div className="flex items-center p-4 bg-white/80 border-b border-pink-50 group-handle cursor-move">
                                    <div className="mr-3 text-slate-300 group-handle cursor-grab"><Icons.Drag /></div>
                                    <div 
                                        className="flex-1 flex items-center gap-2 cursor-pointer"
                                        onClick={() => {
                                            const newGroups = groups.map(g => g.id === group.id ? {...g, isOpen: !g.isOpen} : g);
                                            setGroups(newGroups);
                                            persist(newGroups);
                                        }}
                                    >
                                        <div className="text-pink-400">
                                            {group.isOpen ? <Icons.ChevronDown /> : <Icons.ChevronRight />}
                                        </div>
                                        <input 
                                            type="text" 
                                            value={group.title}
                                            onClick={(e) => e.stopPropagation()}
                                            onChange={(e) => {
                                                const newGroups = groups.map(g => g.id === group.id ? {...g, title: e.target.value} : g);
                                                setGroups(newGroups);
                                                persist(newGroups);
                                            }}
                                            className="bg-transparent font-black text-slate-600 outline-none w-full"
                                        />
                                        <span className="text-[10px] bg-pink-100 text-pink-500 px-2 py-0.5 rounded-full font-bold">
                                            {group.accounts.length}
                                        </span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <button 
                                            onClick={() => addAccount(group.id)}
                                            className="p-1.5 text-pink-400 hover:bg-pink-100 rounded-lg"
                                        >
                                            <Icons.Plus />
                                        </button>
                                        <button 
                                            onClick={() => {
                                                if(confirm(`刪除「${group.title}」及其下所有帳號？`)) {
                                                    const newGroups = groups.filter(g => g.id !== group.id);
                                                    setGroups(newGroups);
                                                    persist(newGroups);
                                                }
                                            }}
                                            className="p-1.5 text-slate-300 hover:text-red-400 rounded-lg"
                                        >
                                            <Icons.Trash />
                                        </button>
                                    </div>
                                </div>

                                {/* Group Content (Accounts) */}
                                {group.isOpen && (
                                    <div 
                                        ref={el => groupRefs.current[group.id] = el}
                                        data-id={group.id}
                                        className="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"
                                    >
                                        {group.accounts.map(acc => (
                                            <div key={acc.id} className="bg-white rounded-2xl p-4 border border-pink-50 shadow-sm flex flex-col gap-3 relative">
                                                {/* Card Header */}
                                                <div className="flex items-center justify-between pb-2 border-b border-pink-50">
                                                    <div className="flex items-center gap-2 flex-1">
                                                        <div className="acc-handle cursor-grab mr-1"><Icons.Drag /></div>
                                                        <input 
                                                            type="text" 
                                                            value={acc.name}
                                                            onChange={(e) => updateAccount(group.id, acc.id, { name: e.target.value })}
                                                            className="font-bold text-slate-700 outline-none w-full text-sm bg-transparent"
                                                        />
                                                    </div>
                                                    <button 
                                                        onClick={() => {
                                                            const newGroups = groups.map(g => g.id === group.id ? {...g, accounts: g.accounts.filter(a => a.id !== acc.id)} : g);
                                                            setGroups(newGroups);
                                                            persist(newGroups);
                                                        }}
                                                        className="text-slate-200 hover:text-red-400"
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                </div>

                                                {/* Tasks */}
                                                <div className="grid grid-cols-4 gap-1.5">
                                                    {taskKeys.map(t => (
                                                        <div key={t.key} className="flex flex-col items-center gap-1">
                                                            <span className="text-[9px] text-slate-400 font-bold">{t.label}</span>
                                                            <button 
                                                                onClick={() => updateAccount(group.id, acc.id, { [t.key]: !acc[t.key] })}
                                                                className={`w-8 h-8 rounded-lg flex items-center justify-center transition-all ${acc[t.key] ? 'bg-pink-500 text-white' : 'bg-slate-50 text-transparent border border-slate-100'}`}
                                                            >
                                                                <Icons.Check />
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>

                                                {/* Countdowns */}
                                                <div className="grid grid-cols-3 gap-2 mt-1">
                                                    {countKeys.map(c => {
                                                        const num = parseInt(acc[c.key], 10);
                                                        const isUrgent = !isNaN(num) && num <= 0;
                                                        return (
                                                            <div key={c.key} className="flex flex-col items-center gap-1">
                                                                <span className="text-[9px] text-slate-400 font-bold">{c.label}</span>
                                                                <div 
                                                                    onClick={() => {
                                                                        if(isUrgent) {
                                                                            updateAccount(group.id, acc.id, { [c.key]: '30' });
                                                                            showNotify(`${acc.name} 領取成功！`);
                                                                        }
                                                                    }}
                                                                    className={`w-full h-8 rounded-lg border flex items-center justify-center transition-all cursor-pointer ${isUrgent ? 'animate-urgent border-red-500 text-red-600' : 'bg-white border-slate-100'}`}
                                                                >
                                                                    <input 
                                                                        type="text" 
                                                                        value={isUrgent ? '領' : (acc[c.key] || '')}
                                                                        onChange={(e) => updateAccount(group.id, acc.id, { [c.key]: e.target.value.replace(/\D/g,'') })}
                                                                        className="w-full bg-transparent text-center text-[10px] font-black outline-none"
                                                                        placeholder="-"
                                                                    />
                                                                    {!isUrgent && acc[c.key] && <span className="text-[8px] opacity-30 absolute right-2">D</span>}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        ))}
                                        {group.accounts.length === 0 && (
                                            <div className="col-span-full py-8 text-center text-slate-300 text-xs italic">
                                                目前沒有帳號，點擊上方 + 新增
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* Backup Modal */}
                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-8 shadow-2xl">
                                <h3 className="text-pink-500 font-black text-xl mb-4 flex items-center gap-2"><Icons.Sync /> 資料備份與同步</h3>
                                <p className="text-xs text-slate-400 mb-4 leading-relaxed">可將代碼複製到手機，或從手機備份還原到此設備。</p>
                                <textarea 
                                    className="w-full h-40 bg-slate-50 border border-slate-100 rounded-2xl p-4 text-[10px] font-mono mb-6 outline-none focus:ring-2 focus:ring-pink-200"
                                    value={backupText}
                                    onChange={(e) => setBackupText(e.target.value)}
                                    placeholder="貼上或生成代碼..."
                                />
                                <div className="grid grid-cols-2 gap-3">
                                    <button 
                                        onClick={() => {
                                            const code = JSON.stringify({ groups, appTitle });
                                            setBackupText(code);
                                            navigator.clipboard.writeText(code).then(() => showNotify("已複製備份代碼！"));
                                        }}
                                        className="py-3 bg-white border border-pink-200 text-pink-500 font-bold rounded-xl hover:bg-pink-50 transition-colors"
                                    >
                                        複製備份
                                    </button>
                                    <button 
                                        onClick={() => {
                                            try {
                                                const p = JSON.parse(backupText);
                                                if(p.groups) {
                                                    setGroups(p.groups);
                                                    if(p.appTitle) setAppTitle(p.appTitle);
                                                    setShowModal(false);
                                                    persist(p.groups, p.appTitle);
                                                    showNotify("同步成功！✨");
                                                }
                                            } catch(e) { showNotify("代碼無效！"); }
                                        }}
                                        className="py-3 bg-pink-500 text-white font-bold rounded-xl shadow-lg shadow-pink-100 hover:bg-pink-600 transition-colors"
                                    >
                                        執行還原
                                    </button>
                                </div>
                                <button onClick={() => setShowModal(false)} className="w-full mt-6 text-slate-300 text-xs font-bold">關閉視窗</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
